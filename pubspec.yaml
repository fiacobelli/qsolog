name: qsolog
description: QSOLog - Ham Radio QSO Logger
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  http: ^1.2.0
  xml: ^6.5.0
  file_picker: ^8.0.0+1
  intl: ^0.19.0
  url_launcher: ^6.2.5
  flutter_svg: ^2.0.10+1
  country_flags: ^2.0.1
  latlong2: ^0.9.0
  flutter_map: ^8.2.2
  google_fonts: ^6.2.1
  provider: ^6.1.2
  uuid: ^4.3.3
  csv: ^6.0.0
  share_plus: ^9.0.0
  flutter_slidable: ^3.1.0
  badges: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  msix: ^3.16.7

flutter:
  uses-material-design: true

msix_config:
  display_name: QSOLog
  publisher_display_name: Francisco Iacobelli KX9F
  identity_name: com.fid.qsolog
  msix_version: 1.0.0.0
  logo_path: windows\runner\resources\app_icon.ico
  certificate_path:  C:\Windows\System32\cert.pfx
  certificate_password: YOUR_CERTIFICATE_PASSWORD